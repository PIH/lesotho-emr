# Developer-convenience overlay, layered on top of either compose.yaml or
# compose.seed.yaml:
#   - exposes the MySQL and Tomcat debug ports
#   - mounts a locally-built distro over whatever's in the openmrs image,
#     so a `mvn clean package` from this repo is what actually runs instead
#
# Usage:
#   docker compose -f compose.yaml -f compose.dev.yaml --env-file default.env up -d
#   docker compose -f compose.seed.yaml -f compose.dev.yaml --env-file default.env up -d
# Or via docker.sh:
#   ./docker.sh <site> start --dev

services:
  db:
    ports:
      - ${MYSQL_PORT:-3306}:3306

  openmrs:
    environment:
      DEBUG: "true"
    ports:
      - ${TOMCAT_DEBUG_PORT:-1044}:1044
    volumes:
      - ../distro/target/distro/web:/openmrs/distribution
